<!DOCTYPE html>

    <title>Ullas M | Resume</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            font-family: 'Poppins', sans-serif;
            display: flex;

            align-items: center;

            flex-direction: column;
            gap: 20px;
            background: rgba(30, 41, 59, 0.6);

            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);

    <div class="nav-bar">
